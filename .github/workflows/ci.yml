name: CI

# Quality gate: type-check + production build on every push and PR to main.
# (Deployment is handled separately by Dokploy's auto-deploy webhook.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc -b --noEmit)
        run: npm run lint

      - name: Production build
        run: npm run build
