# nginx config for the ToDining SPA (see Dockerfile serve stage).
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Compress text assets on the fly.
    gzip              on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # Vite fingerprints asset filenames, so they can be cached forever.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA fallback: client-side routes (/admin, /r/:slug/t/:id, …) all serve index.html.
    # index.html itself is never cached, so a new deploy is picked up immediately.
    location / {
        try_files  $uri /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }
}
